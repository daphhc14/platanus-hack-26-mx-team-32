<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1::before {
      content: "🧵";
      font-size: 18px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      border: 1px solid #0f3460;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      display: block;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
    }
    .stat.fosa .stat-value { color: #ff5252; }
    .stat.desap .stat-value { color: #ffb74d; }
    .stat.total .stat-value { color: #4fc3f7; }
    .stat.ubi .stat-value { color: #81c784; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #0f3460;
      border-bottom: 1px solid #0f3460;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 12px;
      transition: 0.3s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .slider { background: #4caf50; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: 0.2s;
    }
    .btn-primary {
      background: #0f3460;
      color: white;
    }
    .btn-primary:hover { background: #1a5276; }
    .btn-secondary {
      background: #2a2a3e;
      color: #aaa;
    }
    .btn-secondary:hover { background: #3a3a4e; }
    .btn-danger {
      background: transparent;
      color: #ff5252;
      border: 1px solid #ff5252;
    }
    .btn-danger:hover { background: #ff525233; }

    .footer {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
    .group-name {
      font-size: 11px;
      color: #4fc3f7;
      margin-bottom: 8px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Hilo Capturador</h1>
  <div class="subtitle">Fosas y puntos de desaparición</div>
  <div class="group-name" id="currentGroup"></div>

  <div class="stats">
    <div class="stat total">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Posts</span>
    </div>
    <div class="stat fosa">
      <span class="stat-value" id="statFosa">0</span>
      <span class="stat-label">Fosas</span>
    </div>
    <div class="stat desap">
      <span class="stat-value" id="statDesap">0</span>
      <span class="stat-label">Desaparic.</span>
    </div>
    <div class="stat ubi">
      <span class="stat-value" id="statUbi">0</span>
      <span class="stat-label">Con ubic.</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Captura automática</span>
    <label class="toggle">
      <input type="checkbox" id="autoCapture" checked>
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn-primary" id="exportBtn">Exportar JSON</button>
  <button class="btn-secondary" id="exportCsvBtn">Exportar CSV (solo ubicaciones)</button>
  <button class="btn-danger" id="clearBtn">Borrar todo</button>

  <div class="footer">PII redactada en tiempo real · v0.1.0</div>

  <script src="detector.js"></script>
  <script src="popup.js"></script>
</body>
</html>
