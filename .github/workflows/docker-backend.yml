name: Build & push backend image

# On every push to main that touches the backend (or this workflow), build the
# image and push `:latest` + `:sha-<short>` to GHCR. Watchtower (on the host,
# via docker-compose.yml) polls GHCR and redeploys the backend automatically.
# Manual trigger available via the Actions tab ("Run workflow").

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
